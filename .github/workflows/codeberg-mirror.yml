name: Mirror to Codeberg

on:
  push:
    branches:
      - '**'
  delete:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GitHub to Codeberg
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git clone --mirror "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GH_REPO}.git" bare
          cd bare
          git remote add codeberg "https://${{ secrets.CODEBERG_TOKEN }}@codeberg.org/noctalia-dev/noctalia-shell.git"
          git push --mirror codeberg
